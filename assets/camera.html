<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Moments</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:url("../Image/MOMENT BACKGROUND.jpeg") center center / cover no-repeat;
    }

    .scene{
      position:relative;
      width:min(96vw, 1400px);
      aspect-ratio:16 / 9;
      overflow:visible;
    }

    /* flower */
    .flower-img{
      position:relative;
      top:6%;
      left:2%;
      width:60%;
      max-width:300px;
      z-index:5;
      
    }

    /* heading */
    .title-img{
      position:relative;
      top:-30%;
      left:50%;
      transform:translateX(-50%);
      width: 60%;
      max-width:620px;
      z-index:4;
      display:block;
    }

    /* center photos */
    .center-photos{
      position:absolute;
      top:32%;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:8px;
      width:auto;
      z-index:4;
    }

    .polaroid{
      width:250px;
      aspect-ratio:3/4;
      object-fit:cover;
      display:block;
      transition:all 0.4s ease;
      cursor:pointer;
    }

    .polaroid:hover{
      transform:scale(1.08);
  
    }

    /* text content */
    .content-img{
      position:absolute;
      top:75%;
      left:37%;
      transform:translateX(-50%);
      width:42%;
      max-width:760px;
      z-index:4;
      display:block;
    }

    /* camera */
    .camera-img{
      position:absolute;
      right:-12%;
      bottom:-8%;
      width:88%;
      max-width:610px;
      z-index:6;
      transform:rotate(-15deg);
      display:block;
    }

    @media (max-width: 900px){
      .title-img{
        width:52%;
        top:12%;
      }

      .flower-img{
        width:16%;
      }

      .polaroid{
        width:130px;
      }

      .center-photos{
        top:35%;
        gap:18px;
      }

      .content-img{
        width:64%;
        top:66%;
      }

      .camera-img{
        width:36%;
      }
    }

    @media (max-width: 640px){
      .scene{
        width:100vw;
        aspect-ratio:9 / 16;
      }

      .title-img{
        width:68%;
        top:10%;
      }

      .flower-img{
        width:22%;
        top:5%;
        left:2%;
      }

      .center-photos{
        top:28%;
        gap:10px;
      }

      .polaroid{
        width:82px;
      }

      .content-img{
        width:82%;
        top:52%;
      }

      .camera-img{
        width:48%;
        right:-6%;
        bottom:-1%;
      }
    }
  </style>
</head>
<body>

  <div class="scene">

    <!-- flower -->
    <img src="../Image/MO WHITE FLOWER.png" alt="Flower" class="flower-img">

    <!-- title image -->
    <img src="../Image/MOMENT MAIN HEADING.png" alt="Best Moments" class="title-img">

    <!-- middle four images -->
    <div class="center-photos">
      <img src="../Image/M1.png" class="polaroid" alt="Photo 1">
      <img src="../Image/MO4.png" class="polaroid" alt="Photo 2">
      <img src="../Image/M3.png" class="polaroid" alt="Photo 3">
      <img src="../Image/M4.png" class="polaroid" alt="Photo 4">
    </div>

    <!-- text content image -->
    <img src="../Image/MO CONTENT.png" alt="Text Content" class="content-img">

    <!-- camera -->
    <img src="../Image/CAMERA.png" alt="Camera" class="camera-img">

  </div>

</body>
</html>
