<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals Over Humans</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:url("../Image/BGGGG.jpeg") center/cover no-repeat;
      font-family:Arial, sans-serif;
    }

    .scene{
      position:relative;
      width:min(92vw, 1300px);
      aspect-ratio:16/10;
    }

    /* white board image */
    .board{
      position:absolute;
      inset:0;
      width:110%;
      height:110%;
      object-fit:contain;
      z-index:1;
      left:-55px;
      top: -10%
      ;
      pointer-events:none;
      user-select:none;
    }

    /* heading image */
    .heading{
      position:absolute;
      top:5%;
      left:50%;
      transform:translateX(-50%);
      width:60%;
      max-width:700px;
      z-index:3;
      pointer-events:none;
      user-select:none;
    }

    /* text image */
    .text-img{
      position:absolute;
      top:31%;
      left:50%;
      transform:translateX(-50%);
      width:30%;
      max-width:470px;
      z-index:3;
      pointer-events:none;
      user-select:none;
    }

    /* common photo style */
    .photo{
      position:absolute;
      width:90%;
      max-width:260px;
      z-index:3;
      display:block;
      user-select:none;
    }

    .photo img{
      width:100%;
      display:block;
      pointer-events:none;
    }

    /* left photos */
    .photo1{
      top:14%;
      left:5%;
      transform:rotate(-9deg);
    }

    .photo2{
      top:46%;
      left:7%;
      transform:rotate(10deg);
    }

    /* right photos */
    .photo3{
      top:15%;
      right:7%;
      transform:rotate(10deg);
    }

    .photo4{
      top:44%;
      right:9%;
      transform:rotate(-10deg);
    }
/* hover effect for photos */

.photo{
transition: all .35s ease;
cursor:pointer;
}

.photo:hover{
transform: scale(1.08) rotate(0deg);
filter: drop-shadow(0 12px 20px rgba(0,0,0,0.25));
z-index:5;
}
.photo1:hover{
transform:scale(1.08) rotate(-5deg);
}

.photo2:hover{
transform:scale(1.08) rotate(5deg);
}

.photo3:hover{
transform:scale(1.08) rotate(5deg);
}

.photo4:hover{
transform:scale(1.08) rotate(-5deg);
}
    @media (max-width: 900px){
      .heading{
        width:58%;
      }

      .text-img{
        width:40%;
      }

      .photo{
        width:16%;
      }

      .photo1{ left:14%; }
      .photo2{ left:18%; }
      .photo3{ right:14%; }
      .photo4{ right:18%; }
    }

    @media (max-width: 640px){
      .scene{
        width:100vw;
        aspect-ratio:9/16;
      }

      .heading{
        width:74%;
        top:9%;
      }

      .text-img{
        width:56%;
        top:33%;
      }

      .photo{
        width:22%;
      }

      .photo1{
        top:24%;
        left:8%;
      }

      .photo2{
        top:62%;
        left:12%;
      }

      .photo3{
        top:24%;
        right:8%;
      }

      .photo4{
        top:62%;
        right:12%;
      }
    }
  </style>
</head>
<body>

  <div class="scene">

    <!-- white background board image -->
    <img src="../Image/ANIMAL BG.png" alt="Board" class="board">

    <!-- heading image -->
    <img src="../Image/ANIMAL MAIN HEADING.png" alt="Animals Over Humans" class="heading">

    <!-- center text image -->
    <img src="../Image/ANIMAL CONTENT.png" alt="Text Content" class="text-img">

    <!-- side images -->
    <div class="photo photo1">
      <img src="../Image/ANIMAL P1.png" alt="Photo 1">
    </div>

    <div class="photo photo2">
      <img src="../Image/ANIMAL P2.png" alt="Photo 2">
    </div>

    <div class="photo photo3">
      <img src="../Image/ANIMAL RIGHT P1.png" alt="Photo 3">
    </div>

    <div class="photo photo4">
      <img src="../Image/ANIMAL RIGHT P2.png" alt="Photo 4">
    </div>

  </div>

</body>
</html>
